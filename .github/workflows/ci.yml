name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, test (Node/Bun/Deno) & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test on Node
        run: npm run test:node

      - name: Test on Bun
        run: npm run test:bun

      - name: Test on Deno
        run: npm run test:deno

      - name: Build bundles
        run: npm run build
