name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint, test (Bun/Node/Deno) & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Bun is the primary toolchain (install, lint, test, build).
      - uses: oven-sh/setup-bun@v2
      # Node and Deno are installed solely for the cross-runtime test matrix.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test on Bun
        run: bun run test:bun

      - name: Test on Node
        run: bun run test:node

      - name: Test on Deno
        run: bun run test:deno

      - name: Build bundles
        run: bun run build
